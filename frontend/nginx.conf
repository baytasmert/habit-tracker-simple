server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Statik dosyalar — cache 1 saat
    location ~* \.(css|js|png|jpg|jpeg|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # SPA-vari fallback yok — direkt sayfa servis
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Sağlık kontrolü
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
