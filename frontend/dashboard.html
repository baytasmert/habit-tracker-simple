<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Habit Tracker — Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="brand-icon">🎯</span>
      <h1>Habit Tracker</h1>
    </div>
    <div class="top-bar-right">
      <span id="greeting" class="greeting"></span>
      <button id="logout-btn" class="logout-btn">Çıkış</button>
    </div>
  </header>

  <main class="dashboard-main">

    <!-- İstatistik kartları -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Alışkanlık</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-label">Bugün Tamamlanan</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">En Uzun Seri 🔥</div>
      </div>
    </section>

    <!-- Yeni alışkanlık (toggle) -->
    <section class="card add-card">
      <button id="toggle-add" class="toggle-add">＋ Yeni Alışkanlık Ekle</button>
      <form id="new-habit-form" class="add-form" hidden>
        <div class="form-row">
          <label>
            İsim
            <input type="text" id="habit-name" required placeholder="Örn: Sabah yürüyüşü">
          </label>
          <label>
            Kategori
            <select id="habit-category">
              <option value="health">🏥 Sağlık</option>
              <option value="fitness">💪 Spor</option>
              <option value="study">📚 Çalışma</option>
              <option value="mindfulness">🧘 Farkındalık</option>
            </select>
          </label>
          <label class="goal-label">
            Hedef
            <div class="goal-input">
              <input type="number" id="habit-goal" min="1" max="7" value="7">
              <span class="goal-unit">gün/hafta</span>
            </div>
          </label>
        </div>
        <label>
          Açıklama <span class="optional">(opsiyonel)</span>
          <input type="text" id="habit-description" placeholder="Kısa bir açıklama...">
        </label>
        <div class="form-actions">
          <p class="error" id="new-habit-error" hidden></p>
          <button type="submit" id="create-habit-btn" class="btn-create">Ekle</button>
        </div>
      </form>
    </section>

    <!-- Bugün takip edilenler (özet) -->
    <section id="today-section" hidden>
      <h2 class="section-title">✅ Bugün Takip Edilenler <span id="today-count" class="count-pill">0</span></h2>
      <div id="today-summary" class="today-summary"></div>
    </section>

    <!-- Tüm alışkanlıklar -->
    <section>
      <h2 class="section-title">📋 Tüm Alışkanlıklar <span id="all-count" class="count-pill">0</span></h2>
      <div id="habits-list" class="habits-list">
        <p class="loading">Yükleniyor...</p>
      </div>
    </section>

  </main>

  <!-- Check-in Modal -->
  <div id="checkin-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">✓ Bugünü Tamamla</h3>
        <button class="modal-close" id="modal-close" aria-label="Kapat">×</button>
      </div>
      <p class="modal-sub" id="modal-sub"></p>
      <form id="checkin-form">
        <div class="mood-block">
          <span class="mood-label">Bugün nasıl hissettin? <span class="optional">(mod)</span></span>
          <div class="mood-picker" id="mood-picker" role="radiogroup" aria-label="Mod seç">
            <button type="button" class="mood-btn" data-mood="😣" title="Çok zor">😣</button>
            <button type="button" class="mood-btn" data-mood="😕" title="Zorlandım">😕</button>
            <button type="button" class="mood-btn" data-mood="😐" title="Normal">😐</button>
            <button type="button" class="mood-btn" data-mood="🙂" title="İyi">🙂</button>
            <button type="button" class="mood-btn" data-mood="😄" title="Harika">😄</button>
          </div>
        </div>
        <label>
          Nasıl geçti? <span class="optional">(not)</span>
          <textarea id="checkin-note" rows="3" placeholder="Bugünle ilgili bir not bırak..."></textarea>
        </label>
        <label class="file-label">
          📷 Fotoğraf ekle <span class="optional">(opsiyonel)</span>
          <input type="file" id="checkin-photo" accept="image/*">
        </label>
        <div class="modal-status" id="modal-status"></div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost-sm" id="modal-cancel">İptal</button>
          <button type="submit" class="btn-create" id="checkin-submit">Tamamla ✓</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
