<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker — Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="brand-icon">🎯</span>
      <h1>Habit Tracker</h1>
    </div>
    <button id="logout-btn" class="logout-btn">Çıkış Yap</button>
  </header>

  <main class="dashboard-main">

    <!-- Yeni Alışkanlık -->
    <section class="card add-card">
      <h2>✚ Yeni Alışkanlık</h2>
      <form id="new-habit-form" class="add-form">
        <div class="form-row">
          <label>
            İsim
            <input type="text" id="habit-name" required placeholder="Örn: Sabah yürüyüşü">
          </label>
          <label>
            Kategori
            <select id="habit-category">
              <option value="health">🏥 Sağlık</option>
              <option value="fitness">💪 Spor</option>
              <option value="study">📚 Çalışma</option>
              <option value="mindfulness">🧘 Farkındalık</option>
            </select>
          </label>
          <label class="goal-label">
            Hedef
            <div class="goal-input">
              <input type="number" id="habit-goal" min="1" max="7" value="7">
              <span class="goal-unit">gün/hafta</span>
            </div>
          </label>
        </div>
        <label>
          Açıklama <span class="optional">(opsiyonel)</span>
          <input type="text" id="habit-description" placeholder="Kısa bir açıklama ekle...">
        </label>
        <div class="form-actions">
          <p class="error" id="new-habit-error" hidden></p>
          <button type="submit" id="create-habit-btn" class="btn-create">Alışkanlık Ekle</button>
        </div>
      </form>
    </section>

    <!-- Alışkanlık Listesi -->
    <section class="card">
      <h2>📋 Alışkanlıklarım</h2>
      <div id="habits-list" class="habits-list">
        <p class="loading">Yükleniyor...</p>
      </div>
    </section>

  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
