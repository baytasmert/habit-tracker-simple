name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:

  # ── 1. Lint ───────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8
      - name: Backend lint
        working-directory: backend
        run: flake8 src tests --max-line-length=120

  # ── 2. Test (pytest + coverage + Testcontainers PostgreSQL) ──
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest (unit + integration + Testcontainers)
        working-directory: backend
        env:
          ENABLE_TRACING: "false"   # CI'da tracing kapalı
        run: pytest

  # ── 3. Newman (Postman API tests against running backend) ────
  newman:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: habituser
          POSTGRES_PASSWORD: habitpass
          POSTGRES_DB: habits
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U habituser -d habits"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g newman
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend in background
        working-directory: backend
        env:
          DATABASE_URL: postgresql://habituser:habitpass@localhost:5432/habits
          SECRET_KEY: ci-secret
          ENABLE_TRACING: "false"
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          nohup uvicorn src.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in {1..20}; do curl -fsS http://localhost:8000/health && break; sleep 2; done
      - name: Run Newman against running API
        run: newman run postman/collection.json --env-var "base_url=http://localhost:8000"

  # ── 4. Build & Push (GHCR) ────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, newman]
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ steps.tags.outputs.backend }}
      frontend-image: ${{ steps.tags.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tags
        name: Compute image tags
        run: |
          BACKEND="${{ env.REGISTRY }}/${{ github.repository }}/backend"
          FRONTEND="${{ env.REGISTRY }}/${{ github.repository }}/frontend"
          echo "backend=$(echo $BACKEND | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "frontend=$(echo $FRONTEND | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend }}:${{ github.sha }}
            ${{ steps.tags.outputs.backend }}:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend }}:${{ github.sha }}
            ${{ steps.tags.outputs.frontend }}:latest

  # ── 5. Deploy to Kind + smoke test ────────────────────────────
  deploy-smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: habit-tracker
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and load images into Kind
        run: |
          docker pull ${{ needs.build.outputs.backend-image }}:${{ github.sha }}
          docker pull ${{ needs.build.outputs.frontend-image }}:${{ github.sha }}
          kind load docker-image ${{ needs.build.outputs.backend-image }}:${{ github.sha }} --name habit-tracker
          kind load docker-image ${{ needs.build.outputs.frontend-image }}:${{ github.sha }} --name habit-tracker
      - name: Render manifests with image tags
        env:
          BACKEND_IMAGE: ${{ needs.build.outputs.backend-image }}:${{ github.sha }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend-image }}:${{ github.sha }}
        run: |
          mkdir -p rendered
          for f in k8s/*.yaml; do
            sed "s|__BACKEND_IMAGE__|$BACKEND_IMAGE|g; s|__FRONTEND_IMAGE__|$FRONTEND_IMAGE|g" "$f" > "rendered/$(basename $f)"
          done
      - name: Apply infra manifests (db, S3, tracing, monitoring)
        run: |
          kubectl apply -f rendered/configmap.yaml
          kubectl apply -f rendered/postgres.yaml
          kubectl apply -f rendered/localstack.yaml
          kubectl apply -f rendered/jaeger.yaml
          kubectl apply -f rendered/prometheus.yaml
          kubectl apply -f rendered/grafana.yaml
          kubectl rollout status deployment/postgres --timeout=2m
          kubectl rollout status deployment/localstack --timeout=2m
          kubectl rollout status deployment/jaeger --timeout=2m
      - name: Apply application manifests
        run: |
          kubectl apply -f rendered/backend.yaml
          kubectl apply -f rendered/frontend.yaml
          kubectl rollout status deployment/backend --timeout=3m
          kubectl rollout status deployment/frontend --timeout=2m
      - name: Smoke test (port-forward + curl /health + /metrics)
        run: |
          kubectl port-forward svc/backend 8000:8000 &
          sleep 5
          curl --fail --retry 10 --retry-delay 3 http://localhost:8000/health
          curl --fail http://localhost:8000/metrics | grep http_requests_total
      - name: k6 smoke against deployed cluster
        uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke
        run: k6 run -e BASE_URL=http://localhost:8000 perf/smoke-test.js
      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods
          kubectl logs deployment/backend --tail=200 || true
          kubectl logs deployment/jaeger --tail=50 || true
          kubectl logs deployment/localstack --tail=50 || true
