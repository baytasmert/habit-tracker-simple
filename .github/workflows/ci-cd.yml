name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  MİMARİ: CI burada (GitHub Actions) · CD ise ArgoCD'de.        ║
  # ║                                                                ║
  # ║   GitHub Actions ─► Git (tag bump) ─► ArgoCD ─► k3s            ║
  # ║   └──── CI ────┘   └─ handoff ─┘    └──── CD (deploy) ────┘    ║
  # ║                                                                ║
  # ║  Bu dosya = CI + CD-tetikleyici. Asıl deploy'u ArgoCD yapar.  ║
  # ║  Event'e göre ayrışır:                                         ║
  # ║   • pull_request → CI bölümü (lint→test→newman→build→smoke)    ║
  # ║   • push main    → yalnız build + CD bölümü (cd-bump)          ║
  # ║                                                                ║
  # ║  Neden merge'de test yok? PR'da geçti; branch protection       ║
  # ║  "require up-to-date" → merge commit = test edilmiş hal.       ║
  # ║  build merge'de de koşar (merge-commit imajı şart).            ║
  # ╚══════════════════════════════════════════════════════════════╝

  # ═══════════════════ CI — KALİTE KAPISI (PR'da) ═══════════════════
  # lint → test → newman → build → deploy-smoke. Hepsi pull_request'te.
  # Bozuk kod yeşil olmadan merge edilemez → prod'a gidemez.

  # ── 1. Lint ───────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8
      - name: Backend lint
        working-directory: backend
        run: flake8 src tests --max-line-length=120

  # ── 2. Test (pytest + coverage + Testcontainers PostgreSQL) ──
  test:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest (unit + integration + Testcontainers)
        working-directory: backend
        env:
          ENABLE_TRACING: "false"   # CI'da tracing kapalı
        run: pytest

  # ── 3. Newman (Postman API tests against running backend) ────
  newman:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: habituser
          POSTGRES_PASSWORD: habitpass
          POSTGRES_DB: habits
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U habituser -d habits"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g newman
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend in background
        working-directory: backend
        env:
          DATABASE_URL: postgresql://habituser:habitpass@localhost:5432/habits
          SECRET_KEY: ci-secret
          ENABLE_TRACING: "false"
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          nohup uvicorn src.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in {1..20}; do curl -fsS http://localhost:8000/health && break; sleep 2; done
      - name: Run Newman against running API
        run: newman run postman/collection.json --env-var "base_url=http://localhost:8000"

  # ── 4. Build & Push (GHCR) ────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, newman]
    # merge'de test/newman atlanir (skipped); build yine de calismali (imaj sart).
    # PR'da ise test+newman gecmeden build calismasin.
    if: >-
      always() &&
      (github.event_name == 'push' ||
       (needs.test.result == 'success' && needs.newman.result == 'success'))
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ steps.tags.outputs.backend }}
      frontend-image: ${{ steps.tags.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tags
        name: Compute image tags
        run: |
          BACKEND="${{ env.REGISTRY }}/${{ github.repository }}/backend"
          FRONTEND="${{ env.REGISTRY }}/${{ github.repository }}/frontend"
          echo "backend=$(echo $BACKEND | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "frontend=$(echo $FRONTEND | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend }}:${{ github.sha }}
            ${{ steps.tags.outputs.backend }}:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend }}:${{ github.sha }}
            ${{ steps.tags.outputs.frontend }}:latest

  # ── 5. Deploy to Kind + smoke test (CI gate) ──────────────────
  deploy-smoke:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: habit-tracker
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and load images into Kind
        run: |
          docker pull ${{ needs.build.outputs.backend-image }}:${{ github.sha }}
          docker pull ${{ needs.build.outputs.frontend-image }}:${{ github.sha }}
          kind load docker-image ${{ needs.build.outputs.backend-image }}:${{ github.sha }} --name habit-tracker
          kind load docker-image ${{ needs.build.outputs.frontend-image }}:${{ github.sha }} --name habit-tracker
      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Helm template + apply (Kind — ingress disabled)
        run: |
          helm template habit-tracker helm/habit-tracker \
            --set backend.image.repository=${{ needs.build.outputs.backend-image }} \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.repository=${{ needs.build.outputs.frontend-image }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set ingress.enabled=false \
            --set backend.image.pullPolicy=IfNotPresent \
            --set frontend.image.pullPolicy=IfNotPresent \
            | kubectl apply -f -
          kubectl rollout status deployment/postgres --timeout=2m
          kubectl rollout status deployment/backend --timeout=3m
          kubectl rollout status deployment/frontend --timeout=2m
      - name: Smoke test (port-forward + curl /health + /metrics)
        run: |
          kubectl port-forward svc/backend 8000:8000 &
          sleep 5
          curl --fail --retry 10 --retry-delay 3 http://localhost:8000/health
          curl --fail http://localhost:8000/metrics | grep http_requests_total
      - name: k6 smoke against deployed cluster
        uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke
        run: k6 run -e BASE_URL=http://localhost:8000 perf/smoke-test.js
      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods
          kubectl logs deployment/backend --tail=200 || true

  # ═══════════════ CD — GİTOPS TETİKLEYİCİ (merge'de) ═══════════════
  # Asıl deploy'u ArgoCD yapar; bu job sadece yeni imaj tag'ini Git'e yazar
  # (handoff). ArgoCD bu commit'i görüp k3s'e otomatik sync eder.

  # ── 6. CD — image tag bump → commit (GitOps trigger) ─────────
  cd-bump:
    runs-on: ubuntu-latest
    needs: build                     # merge'de deploy-smoke koşmuyor; build yeter
    # always(): build'in atlanmış upstream'i (test/newman) yüzünden skip'in
    # cd-bump'a sızmasını engeller. needs.build.result: build çökerse deploy etme.
    if: >-
      always() &&
      needs.build.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write                # k8s/kustomization.yaml'a commit gerekli
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump image tag & push (conflict-free)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SHA="${{ github.sha }}"
          F="helm/habit-tracker/values.yaml"
          # Her denemede taze main'e sıfırla, tag'i yeniden uygula → rebase
          # çakışması olmaz (aynı satırı iki taraf da değiştirmiyor; biz
          # her seferinde en günceli baz alıp üstüne yazıyoruz).
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            sed -i "s|^    tag:.*|    tag: ${SHA}|1" "$F"
            sed -i "0,/^    tag:.*/! s|^    tag:.*|    tag: ${SHA}|1" "$F"
            if git diff --quiet "$F"; then
              echo "Tag zaten güncel — atlanıyor."
              exit 0
            fi
            git add "$F"
            git commit -m "ci: bump image tags to ${SHA} [skip ci]"
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push reddedildi, taze main ile tekrar ($i)..."
            sleep 3
          done
          echo "5 denemede push edilemedi" >&2
          exit 1
