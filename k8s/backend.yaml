---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          # kustomization.yaml'da images: alanı bu adı (`backend`) GHCR
          # imajıyla + tag ile değiştirir. CI her main push'unda
          # `kustomize edit set image backend=...:<sha>` çağırır.
          image: backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: backend-config }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
