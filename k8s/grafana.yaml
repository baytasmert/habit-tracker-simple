---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: { app: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: admin }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: admin }
          volumeMounts:
            - { name: ds, mountPath: /etc/grafana/provisioning/datasources }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits: { memory: 512Mi, cpu: 300m }
      volumes:
        - name: ds
          configMap: { name: grafana-datasources }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
