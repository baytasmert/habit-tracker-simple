---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels: { app: localstack }
spec:
  replicas: 1
  selector:
    matchLabels: { app: localstack }
  template:
    metadata:
      labels: { app: localstack }
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.0   # Community Edition (free)
          ports:
            - containerPort: 4566
          env:
            - { name: SERVICES, value: "s3" }
            - { name: DEFAULT_REGION, value: "us-east-1" }
          readinessProbe:
            httpGet: { path: /_localstack/health, port: 4566 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits: { memory: 1Gi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector: { app: localstack }
  ports:
    - port: 4566
      targetPort: 4566
