---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          # backend-config ConfigMap'inden user/password/db oku — backend
          # ile aynı kaynaktan çekildiği için ikisi her zaman uyumlu olur.
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_DB } }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
