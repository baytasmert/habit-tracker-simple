# ─────────────────────────────────────────────────────────────────
# ArgoCD Application — GitOps deploy manifest      (+5 bonus puan)
# ─────────────────────────────────────────────────────────────────
# Önce ArgoCD'nin cluster'da kurulu olması gerekir:
#
#   kubectl create namespace argocd
#   kubectl apply -n argocd \
#     -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#   kubectl wait --for=condition=available --timeout=300s \
#     deployment/argocd-server -n argocd
#
# ArgoCD UI'a port-forward:
#
#   kubectl port-forward svc/argocd-server -n argocd 8090:443
#   # User: admin  Password:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d
#
# Bu Application'ı apply etmek için:
#
#   kubectl apply -f k8s/argocd/application.yaml
#
# ArgoCD bu repo'yu watch eder, k8s/ klasöründeki manifestleri
# otomatik sync eder. Yeni commit → otomatik deploy.
# ─────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: habit-tracker-simple
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/baytasmert/habit-tracker-simple.git
    targetRevision: main
    path: k8s
    directory:
      recurse: false
      exclude: 'argocd/*'   # Bu klasör ArgoCD'nin kendisi tarafından yönetilmez

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true       # Repo'da olmayan kaynaklar silinir
      selfHeal: true    # Drift olursa otomatik düzeltir
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
