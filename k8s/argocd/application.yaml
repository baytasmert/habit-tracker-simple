# ─────────────────────────────────────────────────────────────────
# ArgoCD Application — Helm chart source
#
# Sunucuda tek seferlik apply:
#   kubectl apply -f k8s/argocd/application.yaml
#
# CI her push'ta helm/habit-tracker/values.yaml içindeki image tag'i
# günceller → ArgoCD sync → cluster'da yeni versiyon
# ─────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: habit-tracker-simple
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/baytasmert/habit-tracker-simple.git
    targetRevision: main
    path: helm/habit-tracker        # Helm chart'ın yolu
    helm:
      releaseName: habit-tracker
      valueFiles:
        - values.yaml               # default values (CI tag'leri buraya yazar)

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
