# ─────────────────────────────────────────────────────────────────
# ArgoCD Application — GitOps for habit-tracker-simple
#
# Watch'ler:  k8s/ klasörü (kustomization.yaml)
# Trigger:    Repo'ya her commit (CI tarafından image bump dahil)
# Action:     kustomize build → kubectl apply (otomatik)
#
# Sunucuya tek seferlik apply:
#   kubectl apply -f k8s/argocd/application.yaml
# ─────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: habit-tracker-simple
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/baytasmert/habit-tracker-simple.git
    targetRevision: main
    path: k8s
    # ArgoCD k8s/kustomization.yaml'ı otomatik algılar.
    # Aşağıdaki blok image override'ları override etmek için kullanılabilir
    # ama gerek yok — CI zaten kustomization.yaml'ı commit'liyor.

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true       # Repo'dan silinen kaynak cluster'dan da silinir
      selfHeal: true    # Manuel kubectl edit yapılırsa düzeltir
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # 3 dakikada bir polling (default 3m). Daha hızlı sync için
  # GitHub webhook eklenebilir (sonra) → instant sync.
  revisionHistoryLimit: 5
