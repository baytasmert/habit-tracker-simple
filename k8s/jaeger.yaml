---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels: { app: jaeger }
spec:
  replicas: 1
  selector:
    matchLabels: { app: jaeger }
  template:
    metadata:
      labels: { app: jaeger }
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.55
          ports:
            - { containerPort: 16686, name: ui }
            - { containerPort: 4317,  name: otlp-grpc }
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          readinessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits: { memory: 512Mi, cpu: 300m }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector: { app: jaeger }
  ports:
    - { name: ui, port: 16686, targetPort: 16686 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
