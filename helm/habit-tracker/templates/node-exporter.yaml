{{- if .Values.nodeExporter.enabled }}
# ─────────────────────────────────────────────────────────────────
# node_exporter — host (VM) seviyesi CPU / RAM / disk / network metrikleri.
# Hafif Go binary'si; DaemonSet → her node'da 1 pod. hostNetwork ile
# pod IP = node IP, Prometheus pod-SD ile 9100'den scrape eder.
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: { app: node-exporter }
  template:
    metadata:
      labels: { app: node-exporter }
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: {{ .Values.nodeExporter.image }}
          args:
            - --path.rootfs=/host/root
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
          ports:
            - { containerPort: 9100, name: metrics, hostPort: 9100 }
          resources: {{- toYaml .Values.nodeExporter.resources | nindent 12 }}
          volumeMounts:
            - { name: proc, mountPath: /host/proc, readOnly: true }
            - { name: sys, mountPath: /host/sys, readOnly: true }
            - { name: root, mountPath: /host/root, mountPropagation: HostToContainer, readOnly: true }
      volumes:
        - { name: proc, hostPath: { path: /proc } }
        - { name: sys, hostPath: { path: /sys } }
        - { name: root, hostPath: { path: / } }
{{- end }}
