---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: localstack }
  template:
    metadata:
      labels: { app: localstack }
    spec:
      containers:
        - name: localstack
          image: {{ .Values.localstack.image }}
          ports:
            - containerPort: 4566
          env:
            - { name: SERVICES, value: "s3" }
            - { name: DEFAULT_REGION, value: "us-east-1" }
          readinessProbe:
            httpGet: { path: /_localstack/health, port: 4566 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources: {{- toYaml .Values.localstack.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: localstack }
  ports:
    - port: 4566
      targetPort: 4566
