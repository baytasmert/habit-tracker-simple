---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: jaeger }
  template:
    metadata:
      labels: { app: jaeger }
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.jaeger.image }}
          ports:
            - { containerPort: 16686, name: ui }
            - { containerPort: 4317, name: otlp-grpc }
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          readinessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.jaeger.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: jaeger }
  ports:
    - { name: ui, port: 16686, targetPort: 16686 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
