---
# Prometheus'un pod'ları keşfedebilmesi için RBAC (namespace-scoped, en az yetki)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-pod-reader
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-pod-reader
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-pod-reader
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      # Backend'i SERVICE üzerinden değil, HER POD'u ayrı ayrı scrape et.
      # (Service scrape edilince 2 replikanın sayaçları tek seriye karışıp
      #  rate() sahte spike üretiyordu.) Her pod artık ayrı instance.
      - job_name: 'habit-tracker-backend'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Release.Namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8000"
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
      # node_exporter — host (VM) CPU / RAM / disk metrikleri
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Release.Namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "9100"
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
{{- if .Values.prometheus.persistence.enabled }}
---
# Metrik geçmişi (TSDB) kalıcı kalsın — restart'ta dünün verileri durur
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.prometheus.persistence.storageClass }}
  storageClassName: {{ .Values.prometheus.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  # PVC ReadWriteOnce → eski pod kapanmadan yeni pod aynı diski tutamaz
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
      annotations:
        # scrape config değişince pod yeniden başlasın — config'i her
        # güncellediğinde bu sayıyı artır (Prometheus provisioning'i sadece
        # başlangıçta okur)
        config-version: "3"
    spec:
      serviceAccountName: prometheus
      # prom/prometheus imajı nobody (65534) çalışır; PVC dizinini bu gruba
      # yazılabilir yap (yoksa TSDB'ye yazamaz, crashloop)
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          # args'ı override edince TÜM bayrakları biz veririz (config yolu dahil)
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.persistence.retention }}
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            {{- if .Values.prometheus.persistence.enabled }}
            - { name: data, mountPath: /prometheus }
            {{- end }}
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        {{- if .Values.prometheus.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
