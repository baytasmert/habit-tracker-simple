---
# Prometheus'un pod'ları keşfedebilmesi için RBAC (namespace-scoped, en az yetki)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-pod-reader
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-pod-reader
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-pod-reader
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      # Backend'i SERVICE üzerinden değil, HER POD'u ayrı ayrı scrape et.
      # (Service scrape edilince 2 replikanın sayaçları tek seriye karışıp
      #  rate() sahte spike üretiyordu.) Her pod artık ayrı instance.
      - job_name: 'habit-tracker-backend'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Release.Namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8000"
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
      # node_exporter — host (VM) CPU / RAM / disk metrikleri
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Release.Namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "9100"
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
      annotations:
        # scrape config değişince pod yeniden başlasın — config'i her
        # güncellediğinde bu sayıyı artır (Prometheus provisioning'i sadece
        # başlangıçta okur)
        config-version: "3"
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
