---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_DB } }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
