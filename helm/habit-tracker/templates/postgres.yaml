{{- if .Values.postgres.persistence.enabled }}
---
# Kalıcı depolama — pod restart / yeniden deploy'da veriler korunur
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  # PVC ReadWriteOnce — rolling update'te iki pod aynı volume'u tutamaz,
  # bu yüzden eski pod önce kapanmalı (Recreate)
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: backend-config, key: POSTGRES_DB } }
            {{- if .Values.postgres.persistence.enabled }}
            # PVC kökündeki lost+found, Postgres init'ini bozmasın diye alt dizin
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            {{- end }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- end }}
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
