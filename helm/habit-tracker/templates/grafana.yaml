---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: {{ .Values.grafana.adminUser | quote }} }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: {{ .Values.grafana.adminPassword | quote }} }
          volumeMounts:
            - { name: ds, mountPath: /etc/grafana/provisioning/datasources }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources: {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: ds
          configMap: { name: grafana-datasources }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
