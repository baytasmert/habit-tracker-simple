---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
# Dashboard provider — /etc/grafana/provisioning/dashboards/ içindeki
# json'ları otomatik yükler
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  provider.yml: |
    apiVersion: 1
    providers:
      - name: 'Habit Tracker'
        orgId: 1
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
# Dashboard JSON (3 panel: request rate, error rate, latency p95/p99)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
data:
  habit-tracker.json: |
{{ .Files.Get "dashboards/habit-tracker.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
      annotations:
        # ConfigMap (datasource/dashboard) değişince pod yeniden başlasın —
        # Grafana provisioning'i sadece başlangıçta okur
        checksum/dashboard: {{ .Files.Get "dashboards/habit-tracker.json" | sha256sum }}
        checksum/config: {{ printf "%s-%s-%s" .Values.grafana.adminUser .Values.grafana.adminPassword "ds-uid-prometheus-v2" | sha256sum }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: {{ .Values.grafana.adminUser | quote }} }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: {{ .Values.grafana.adminPassword | quote }} }
          volumeMounts:
            - { name: ds, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dash-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dash-json, mountPath: /var/lib/grafana/dashboards }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources: {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: ds
          configMap: { name: grafana-datasources }
        - name: dash-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dash-json
          configMap: { name: grafana-dashboard-json }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
