{{- if and .Values.ingress.enabled .Values.basicAuth.enabled }}
# ── Traefik BasicAuth: jaeger/prometheus/api'yi korur ─────────────
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-basic-auth
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
type: Opaque
stringData:
  users: {{ .Values.basicAuth.users | quote }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-auth
  labels: {{- include "habit-tracker.labels" . | nindent 4 }}
spec:
  basicAuth:
    secret: dashboard-basic-auth
    realm: "Habit Tracker — Yetkili Erişim"
{{- end }}
