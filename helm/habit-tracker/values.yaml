# ─────────────────────────────────────────────────────────────────
# Default values — production override'lar için:
#   helm upgrade --install habit-tracker ./helm/habit-tracker \
#     --set domain=app.example.com \
#     --set backend.image.tag=abc123
#
# ArgoCD değerleri k8s/argocd/application.yaml içindeki helm.values
# bloğundan gelir.
# ─────────────────────────────────────────────────────────────────

# ── Domain ────────────────────────────────────────────────────────
# nip.io: domain gerektirmez — IP adresini tire ile yaz
# Örnek: 104-249-8-24.nip.io
domain: "vivabit.digital"

# ── Imajlar ────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/baytasmert/habit-tracker-simple/backend
    tag: 2de47f9c2b2bf9c53bd91479e080acd26f56f767
    pullPolicy: IfNotPresent
  # Tek replika: aktif kullanıcı / in-flight metrikleri tek bellekte → kesin
  # sayım (2 replikada pod-local sayaçlar toplanınca yaklaşıktı). HA için 2 yap.
  replicas: 1
  # CPU limiti 500m→2000m: yük altında bcrypt tek pod'u throttle ediyordu
  # (host CPU boştayken p95 13s'ye fırlıyordu). Host'ta yer var, pod'a ver.
  resources:
    requests: { memory: 128Mi, cpu: 250m }
    limits: { memory: 512Mi, cpu: 2000m }

frontend:
  image:
    repository: ghcr.io/baytasmert/habit-tracker-simple/frontend
    tag: 2de47f9c2b2bf9c53bd91479e080acd26f56f767
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests: { memory: 32Mi, cpu: 50m }
    limits: { memory: 128Mi, cpu: 200m }

# ── Veritabanı ────────────────────────────────────────────────────
postgres:
  image: postgres:16-alpine
  user: habituser
  password: habitpass
  db: habits
  # Kalıcı depolama — PVC ile veriler pod restart/yeniden deploy'da KORUNUR.
  # k3s varsayılan storageClass'ı local-path otomatik provisioning yapar.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""   # boş = cluster varsayılanı (k3s: local-path)
  resources:
    requests: { memory: 128Mi, cpu: 100m }
    limits: { memory: 512Mi, cpu: 500m }

# ── Auth ──────────────────────────────────────────────────────────
secretKey: "change-me-in-production"
accessTokenExpireMinutes: 60

# ── LocalStack S3 ─────────────────────────────────────────────────
localstack:
  image: localstack/localstack:3.0
  s3Bucket: habit-photos
  resources:
    requests: { memory: 256Mi, cpu: 100m }
    limits: { memory: 1Gi, cpu: 500m }

# ── Jaeger ────────────────────────────────────────────────────────
jaeger:
  image: jaegertracing/all-in-one:1.55
  resources:
    requests: { memory: 128Mi, cpu: 50m }
    limits: { memory: 512Mi, cpu: 300m }

# ── Prometheus ────────────────────────────────────────────────────
prometheus:
  image: prom/prometheus:v2.51.0
  # Metrik geçmişi kalıcı — restart'ta önceki günlerin verileri korunur
  persistence:
    enabled: true
    size: 2Gi
    retention: "15d"        # 15 günlük metrik sakla
    storageClass: ""        # boş = cluster varsayılanı (k3s: local-path)
  resources:
    requests: { memory: 128Mi, cpu: 50m }
    limits: { memory: 512Mi, cpu: 300m }

# ── node_exporter (host CPU/RAM/disk) ─────────────────────────────
nodeExporter:
  enabled: true
  image: prom/node-exporter:v1.7.0
  resources:
    requests: { memory: 32Mi, cpu: 20m }
    limits: { memory: 128Mi, cpu: 200m }

# ── Grafana ───────────────────────────────────────────────────────
grafana:
  image: grafana/grafana:10.4.0
  adminUser: admin
  # admin.1234 → varsayılan "admin" olmadığı için Grafana her girişte
  # şifre değiştirmeye zorlamaz (forced password change tetiklenmez)
  adminPassword: admin.1234
  resources:
    requests: { memory: 128Mi, cpu: 50m }
    limits: { memory: 512Mi, cpu: 300m }

# ── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: true
  className: traefik
  tls: true
  certIssuer: letsencrypt-prod

# ── Basic Auth (jaeger / prometheus / api koruması) ───────────────
# Traefik BasicAuth middleware ile korunur. Aşağıdaki sadece bcrypt HASH;
# düz şifre repoda tutulmaz → .env (BASIC_AUTH_USER/PASSWORD).
# Yeni hash:  htpasswd -nbB <user> <şifre>
basicAuth:
  enabled: true
  users: "admin:$2y$12$pZvDuLnGDxQ/hsYWgFsh8upA6gIcxG6qDKT8or5YGIC1VyQRz00bW"

# ── Image pull secret (GHCR) ──────────────────────────────────────
imagePullSecret: ghcr-pull
